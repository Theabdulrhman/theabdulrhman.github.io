  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n}\n/* devanagari */\n@font-face {\n  font-family: 'Rajdhani';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"07c655d2-862c-4448-8254-5594fa4c40e6\") format('woff2');\n  unicode-range: U+0900-097F, U+1CD0-1CF9, U+200C-200D, U+20A8, U+20B9, U+20F0, U+25CC, U+A830-A839, U+A8E0-A8FF, U+11B00-11B09;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Rajdhani';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"04317854-0f6f-4d47-a26a-cf84f085b9f2\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Rajdhani';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"9c1d732b-ea49-4f17-94fb-19d3bf4204c8\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* devanagari */\n@font-face {\n  font-family: 'Rajdhani';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"6bae8cf8-4801-4f4d-87b7-7f1941357102\") format('woff2');\n  unicode-range: U+0900-097F, U+1CD0-1CF9, U+200C-200D, U+20A8, U+20B9, U+20F0, U+25CC, U+A830-A839, U+A8E0-A8FF, U+11B00-11B09;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Rajdhani';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"6190cb0b-2061-49a6-939a-02fb424c66a6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Rajdhani';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b1e2fca7-cf5a-4f60-8bbf-fb012fc2a719\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* devanagari */\n@font-face {\n  font-family: 'Rajdhani';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b7f82f5f-b4c6-4c5d-813c-eec60744943b\") format('woff2');\n  unicode-range: U+0900-097F, U+1CD0-1CF9, U+200C-200D, U+20A8, U+20B9, U+20F0, U+25CC, U+A830-A839, U+A8E0-A8FF, U+11B00-11B09;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Rajdhani';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"120f1ef5-86a5-4157-a672-9cf1fd4eaa5e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Rajdhani';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c4eb7d38-29a4-4bb1-a2a6-2a9f47d46347\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin */\n@font-face {\n  font-family: 'Share Tech Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"2ae44213-d0d8-4338-b6ae-710e631f07ef\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root {\n  --red:        #FF6700;\n  --blue:       #061537;\n  --blue-light: #1a4a8a;\n  --blue-glow:  rgba(6,21,55,0.8);\n  --red-glow:   rgba(255,103,0,0.3);\n  --bg:         #07070f;\n  --bg2:        #0b0b18;\n  --bg3:        #0f0f20;\n  --white:      #f0f0f8;\n  --muted:      #5a5a78;\n  --border:     rgba(255,255,255,0.06);\n}\n\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; }\nbody { background: var(--bg); color: var(--white); font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }\n\n::-webkit-scrollbar { width: 3px; }\n::-webkit-scrollbar-track { background: var(--bg); }\n::-webkit-scrollbar-thumb { background: var(--red); }\n\n/* ═══ NAV ═══ */\nnav {\n  position: fixed; top: 0; left: 0; right: 0; z-index: 200;\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 0 60px; height: 64px;\n  background: rgba(7,7,15,0.7); backdrop-filter: blur(20px);\n  border-bottom: 1px solid var(--border);\n}\n.nav-logo {\n  font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 900;\n  letter-spacing: 5px; color: var(--red); text-decoration: none;\n  text-shadow: 0 0 30px var(--red-glow);\n}\n.nav-links { display: flex; gap: 28px; list-style: none; }\n.nav-links a {\n  font-family: 'Share Tech Mono', monospace; font-size: 11px;\n  letter-spacing: 2px; color: var(--muted); text-decoration: none; text-transform: uppercase;\n  transition: color 0.25s;\n}\n.nav-links a:hover { color: var(--white); }\n.nav-btn {\n  font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 3px;\n  color: var(--white); border: 1px solid rgba(255,255,255,0.2); padding: 8px 20px;\n  text-decoration: none; text-transform: uppercase; transition: border-color 0.25s, color 0.25s;\n}\n.nav-btn:hover { border-color: var(--red); color: var(--red); }\n\n/* ═══ HERO ═══ */\n#hero {\n  position: relative; min-height: 100vh;\n  display: flex; flex-direction: column; align-items: center; justify-content: center;\n  text-align: center; overflow: hidden;\n  background: var(--bg);\n}\n\n/* Grid */\n.hero-grid {\n  position: absolute; inset: 0;\n  background-image:\n    linear-gradient(rgba(255,0,0,0.03) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(255,0,0,0.03) 1px, transparent 1px);\n  background-size: 80px 80px;\n  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);\n}\n\n/* Vignette */\n.hero-vignette {\n  position: absolute; inset: 0;\n  background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, rgba(7,7,15,0.8) 100%);\n  z-index: 1;\n}\n\n/* Red horizon line */\n.hero-horizon {\n  position: absolute; bottom: 30%; left: 0; right: 0; height: 1px;\n  background: linear-gradient(90deg, transparent 0%, var(--red) 30%, var(--red) 70%, transparent 100%);\n  opacity: 0.15; z-index: 1;\n}\n\n/* Side accent lines */\n.hero-line-l, .hero-line-r {\n  position: absolute; top: 0; bottom: 0; width: 1px; z-index: 1;\n}\n.hero-line-l { left: 60px; background: linear-gradient(180deg, transparent, var(--red) 30%, var(--red) 70%, transparent); opacity: 0.12; }\n.hero-line-r { right: 60px; background: linear-gradient(180deg, transparent, var(--red) 30%, var(--red) 70%, transparent); opacity: 0.12; }\n\n.hero-content { position: relative; z-index: 2; max-width: 1000px; padding: 0 40px; }\n\n.hero-eyebrow {\n  font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 6px;\n  color: var(--muted); text-transform: uppercase; margin-bottom: 36px;\n  display: flex; align-items: center; justify-content: center; gap: 16px;\n}\n.hero-eyebrow::before, .hero-eyebrow::after {\n  content: ''; flex: 1; max-width: 80px; height: 1px;\n  background: linear-gradient(90deg, transparent, var(--muted));\n}\n.hero-eyebrow::after { background: linear-gradient(270deg, transparent, var(--muted)); }\n\n.hero-name {\n  font-family: 'Orbitron', sans-serif; font-size: clamp(56px, 10vw, 140px);\n  font-weight: 900; text-transform: uppercase; letter-spacing: -3px; line-height: 0.9;\n  margin-bottom: 28px; color: var(--white);\n}\n.hero-name em {\n  font-style: normal; display: block;\n  color: transparent; -webkit-text-stroke: 1.5px var(--red);\n  position: relative;\n}\n.hero-name em::before {\n  content: attr(data-text); position: absolute; left: 4px; top: 3px;\n  color: var(--red); opacity: 0.15;\n  animation: glitch 6s infinite;\n}\n@keyframes glitch {\n  0%,88%,100% { clip-path: none; transform: translateX(0); }\n  89% { clip-path: polygon(0 20%, 100% 20%, 100% 45%, 0 45%); transform: translateX(6px); }\n  90% { clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%); transform: translateX(-4px); }\n  91% { clip-path: none; transform: translateX(0); }\n}\n\n.hero-tagline {\n  font-family: 'Rajdhani', sans-serif; font-size: clamp(16px, 2vw, 22px);\n  font-weight: 300; letter-spacing: 4px; color: var(--muted);\n  text-transform: uppercase; margin-bottom: 52px;\n}\n.hero-tagline strong { color: var(--white); font-weight: 500; }\n\n.hero-actions { display: flex; gap: 16px; justify-content: center; }\n\n.btn-red {\n  font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;\n  letter-spacing: 3px; text-transform: uppercase; text-decoration: none;\n  padding: 16px 40px; background: var(--red); color: var(--white); border: none; cursor: pointer;\n  transition: box-shadow 0.3s, transform 0.2s;\n  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));\n}\n.btn-red:hover { box-shadow: 0 0 40px var(--red-glow), 0 0 80px rgba(255,0,0,0.1); transform: translateY(-2px); }\n\n.btn-ghost {\n  font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 600;\n  letter-spacing: 3px; text-transform: uppercase; text-decoration: none;\n  padding: 15px 40px; background: transparent; color: var(--white);\n  border: 1px solid rgba(255,255,255,0.2); cursor: pointer;\n  transition: border-color 0.25s, color 0.25s;\n}\n.btn-ghost:hover { border-color: var(--white); }\n\n/* scroll arrow */\n.scroll-indicator {\n  position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 2;\n  font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 3px;\n  color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 10px;\n}\n.scroll-arrow {\n  width: 1px; height: 50px;\n  background: linear-gradient(180deg, var(--muted), transparent);\n  animation: scrollpulse 2s ease-in-out infinite;\n}\n@keyframes scrollpulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }\n\n/* ═══ MARATHON-STYLE SECTION PATTERN ═══ */\n.m-section {\n  position: relative; padding: 120px 60px;\n}\n.m-section.dark { background: var(--bg); }\n.m-section.darker { background: var(--bg2); }\n\n/* Eyebrow + title pattern (Marathon DNA) */\n.m-eyebrow {\n  font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 5px;\n  color: var(--red); text-transform: uppercase; margin-bottom: 20px;\n}\n.m-title {\n  font-family: 'Orbitron', sans-serif; font-weight: 900; text-transform: uppercase;\n  letter-spacing: 1px; line-height: 1.0; color: var(--white);\n  font-size: clamp(32px, 5vw, 64px);\n}\n.m-body {\n  font-size: 17px; color: var(--muted); line-height: 1.75; max-width: 520px;\n  margin-top: 24px; font-weight: 400;\n}\n.m-body strong { color: var(--white); }\n\n/* Thin red divider */\n.m-divider {\n  height: 1px; margin: 0;\n  background: linear-gradient(90deg, var(--red) 0%, rgba(6,21,55,0.5) 60%, transparent 100%);\n  opacity: 0.4;\n}\n\n/* ═══ ABOUT — Marathon alternating layout ═══ */\n.about-wrap {\n  max-width: 1200px; margin: 0 auto;\n  display: grid; grid-template-columns: 1fr 1fr; gap: 100px; align-items: center;\n}\n.about-visual-wrap { position: relative; }\n.about-frame {\n  aspect-ratio: 3/4; max-width: 380px;\n  background: var(--bg3); position: relative; overflow: hidden;\n  border: 1px solid var(--border);\n  clip-path: polygon(0 0, calc(100% - 30px) 0, 100% 30px, 100% 100%, 30px 100%, 0 calc(100% - 30px));\n}\n.about-frame-hatch {\n  position: absolute; inset: 0;\n  background: repeating-linear-gradient(45deg, rgba(255,0,0,0.02) 0px, rgba(255,0,0,0.02) 1px, transparent 1px, transparent 10px);\n}\n.about-frame-label {\n  position: absolute; inset: 0; display: flex; flex-direction: column;\n  align-items: center; justify-content: center; gap: 8px;\n  font-family: 'Share Tech Mono', monospace; font-size: 11px;\n  color: rgba(255,255,255,0.15); letter-spacing: 2px;\n}\n.about-frame::after {\n  content: ''; position: absolute; top: 0; right: 0;\n  border-style: solid; border-width: 0 30px 30px 0;\n  border-color: transparent var(--red) transparent transparent;\n}\n/* data tags */\n.about-data {\n  position: absolute; bottom: -20px; right: -20px;\n  background: var(--bg); border: 1px solid var(--border);\n  border-left: 2px solid var(--red);\n  padding: 12px 20px;\n  font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted);\n}\n.about-data span { display: block; color: var(--white); font-size: 13px; margin-bottom: 2px; }\n\n.about-cta-row { display: flex; gap: 16px; margin-top: 44px; }\n\n.about-stats { display: flex; gap: 48px; margin-top: 40px; padding-top: 32px; border-top: 1px solid var(--border); }\n.stat-num { font-family: 'Orbitron', sans-serif; font-size: 40px; font-weight: 900; color: var(--red); display: block; line-height: 1; }\n.stat-lbl { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-top: 6px; display: block; }\n\n/* ═══ SKILLS — Marathon data-readout style ═══ */\n.skills-header { max-width: 1200px; margin: 0 auto 64px; }\n\n.skills-readout {\n  max-width: 1200px; margin: 0 auto;\n  display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;\n}\n.skill-panel {\n  background: var(--bg3); padding: 48px 36px;\n  position: relative; overflow: hidden;\n  border-top: 1px solid var(--border);\n  transition: background 0.3s;\n}\n.skill-panel:hover { background: #121228; }\n.skill-panel::before {\n  content: ''; position: absolute; top: 0; left: 0;\n  width: 100%; height: 2px;\n  background: linear-gradient(90deg, var(--red), transparent);\n  opacity: 0; transition: opacity 0.3s;\n}\n.skill-panel:hover::before { opacity: 1; }\n\n.skill-num {\n  font-family: 'Orbitron', sans-serif; font-size: 72px; font-weight: 900;\n  color: rgba(255,0,0,0.06); line-height: 1; position: absolute;\n  top: 20px; right: 24px; pointer-events: none; user-select: none;\n}\n.skill-tag { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 4px; color: var(--red); margin-bottom: 20px; }\n.skill-title { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; color: var(--white); margin-bottom: 16px; }\n.skill-desc { font-size: 15px; color: var(--muted); line-height: 1.65; margin-bottom: 32px; }\n\n.skill-meter { margin-bottom: 24px; }\n.skill-meter-row { display: flex; justify-content: space-between; margin-bottom: 8px; }\n.skill-meter-name { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); }\n.skill-meter-val { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--red); }\n.skill-bar-track { height: 2px; background: rgba(255,255,255,0.06); }\n.skill-bar-fill { height: 100%; background: linear-gradient(90deg, var(--red), rgba(255,0,0,0.3)); transition: width 1.4s cubic-bezier(0.4,0,0.2,1); }\n\n.skill-tools { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 20px; }\n.tool-chip {\n  font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 1px;\n  color: var(--muted); border: 1px solid rgba(255,255,255,0.06); padding: 4px 10px;\n}\n\n/* ═══ PROJECTS — Marathon full-bleed alternating ═══ */\n.project-feature {\n  max-width: 1200px; margin: 0 auto 4px;\n  display: grid; grid-template-columns: 1fr 1fr; min-height: 500px;\n  border: 1px solid var(--border); overflow: hidden;\n}\n.project-feature.flip { direction: rtl; }\n.project-feature.flip > * { direction: ltr; }\n\n.proj-visual {\n  background: var(--bg3); position: relative; overflow: hidden; min-height: 400px;\n  display: flex; align-items: center; justify-content: center;\n}\n.proj-visual-hatch {\n  position: absolute; inset: 0;\n  background: repeating-linear-gradient(-45deg, rgba(255,0,0,0.015) 0, rgba(255,0,0,0.015) 1px, transparent 1px, transparent 14px);\n}\n.proj-visual-label {\n  position: relative; z-index: 1;\n  font-family: 'Share Tech Mono', monospace; font-size: 11px;\n  color: rgba(255,255,255,0.1); letter-spacing: 3px; text-align: center;\n}\n.proj-visual-accent {\n  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;\n  background: linear-gradient(90deg, var(--red), transparent);\n}\n.proj-visual-num {\n  position: absolute; top: 24px; left: 24px;\n  font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;\n  letter-spacing: 4px; color: rgba(255,0,0,0.3);\n}\n\n.proj-info {\n  padding: 60px 52px; display: flex; flex-direction: column; justify-content: center;\n  background: var(--bg3);\n}\n.proj-eyebrow { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 4px; color: var(--red); margin-bottom: 20px; }\n.proj-title { font-family: 'Orbitron', sans-serif; font-size: clamp(22px, 3vw, 36px); font-weight: 900; color: var(--white); line-height: 1.1; margin-bottom: 20px; }\n.proj-desc { font-size: 15px; color: var(--muted); line-height: 1.75; margin-bottom: 36px; }\n.proj-link {\n  font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 3px;\n  color: var(--white); text-decoration: none; display: inline-flex; align-items: center; gap: 12px;\n  border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 8px;\n  transition: color 0.2s, border-color 0.2s, gap 0.2s;\n}\n.proj-link:hover { color: var(--red); border-color: var(--red); gap: 20px; }\n\n/* Small project grid */\n.small-projects {\n  max-width: 1200px; margin: 4px auto 0;\n  display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;\n}\n.small-proj {\n  background: var(--bg3); padding: 36px 32px; border: 1px solid var(--border);\n  position: relative; overflow: hidden; cursor: pointer;\n  transition: border-color 0.3s, background 0.3s;\n}\n.small-proj:hover { border-color: rgba(255,0,0,0.3); background: #121228; }\n.small-proj-tag { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--red); margin-bottom: 14px; }\n.small-proj-title { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700; color: var(--white); margin-bottom: 10px; }\n.small-proj-desc { font-size: 14px; color: var(--muted); line-height: 1.6; }\n.small-proj-arrow { position: absolute; bottom: 28px; right: 28px; font-size: 16px; color: var(--muted); transition: color 0.2s, transform 0.2s; }\n.small-proj:hover .small-proj-arrow { color: var(--red); transform: translateX(4px); }\n\n/* ═══ AV / MEDIA ═══ */\n.av-section-bg {\n  position: relative; padding: 120px 60px;\n  background: var(--bg);\n}\n.av-grid {\n  max-width: 1200px; margin: 64px auto 0;\n  display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;\n}\n.av-tile {\n  background: var(--bg3); padding: 40px 36px; border-top: 1px solid var(--border);\n  position: relative; min-height: 200px; display: flex; flex-direction: column; justify-content: space-between;\n  transition: background 0.3s;\n}\n.av-tile:hover { background: #121228; }\n.av-tile::before {\n  content: ''; position: absolute; top: 0; left: 0;\n  width: 0; height: 2px; background: var(--red);\n  transition: width 0.4s ease;\n}\n.av-tile:hover::before { width: 100%; }\n\n.av-tile-type { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 4px; color: var(--red); margin-bottom: 16px; }\n.av-tile-title { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; color: var(--white); flex: 1; }\n.av-tile-status {\n  margin-top: 20px; font-family: 'Share Tech Mono', monospace; font-size: 9px;\n  letter-spacing: 3px; color: var(--muted);\n  border: 1px solid var(--border); display: inline-block; padding: 4px 10px;\n}\n\n/* ═══ BLOG — Marathon news cards ═══ */\n.blog-section { padding: 120px 60px; background: var(--bg2); }\n.blog-header { max-width: 1200px; margin: 0 auto 64px; }\n.blog-grid {\n  max-width: 1200px; margin: 0 auto;\n  display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px;\n}\n.blog-card {\n  background: var(--bg3); border: 1px solid var(--border);\n  display: grid; grid-template-columns: 180px 1fr; overflow: hidden;\n  text-decoration: none; color: inherit; transition: border-color 0.3s;\n}\n.blog-card:hover { border-color: rgba(255,0,0,0.3); }\n.blog-card:hover .blog-card-arrow { color: var(--red); transform: translateX(6px); }\n\n.blog-card-img {\n  background: var(--bg); position: relative; overflow: hidden;\n  display: flex; align-items: center; justify-content: center;\n}\n.blog-card-img-hatch {\n  position: absolute; inset: 0;\n  background: repeating-linear-gradient(45deg, rgba(255,0,0,0.02) 0, rgba(255,0,0,0.02) 1px, transparent 1px, transparent 8px);\n}\n.blog-card-img-label { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.1); letter-spacing: 2px; z-index: 1; }\n\n.blog-card-body { padding: 28px 32px; display: flex; flex-direction: column; justify-content: space-between; }\n.blog-card-date { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--red); margin-bottom: 12px; }\n.blog-card-title { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 600; color: var(--white); line-height: 1.3; margin-bottom: 10px; }\n.blog-card-excerpt { font-size: 13px; color: var(--muted); line-height: 1.6; flex: 1; }\n.blog-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }\n.blog-card-arrow { font-size: 16px; color: var(--muted); transition: color 0.2s, transform 0.2s; }\n\n/* ═══ CONTACT — Marathon minimal ═══ */\n.contact-section { padding: 120px 60px; background: var(--bg); }\n.contact-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 100px; align-items: start; }\n\n.contact-left .m-body { max-width: 400px; }\n\n/* Data links */\n.contact-data { margin-top: 48px; display: flex; flex-direction: column; gap: 2px; }\n.contact-data-row {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 16px 20px; background: var(--bg3); border-top: 1px solid var(--border);\n  text-decoration: none; color: inherit;\n  transition: border-top-color 0.25s, background 0.25s;\n}\n.contact-data-row:hover { border-top-color: var(--red); background: #121228; }\n.contact-data-key { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--muted); }\n.contact-data-val { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--white); letter-spacing: 1px; }\n.contact-data-row:hover .contact-data-val { color: var(--red); }\n\n/* Form */\n.contact-form { display: flex; flex-direction: column; gap: 2px; }\n.form-row-label {\n  font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 3px;\n  color: var(--muted); margin-bottom: 6px; display: block;\n}\n.cp-input {\n  width: 100%; background: var(--bg3); border: none; border-top: 1px solid var(--border);\n  padding: 16px 20px; font-family: 'Rajdhani', sans-serif; font-size: 16px;\n  color: var(--white); outline: none; transition: border-top-color 0.25s;\n  margin-bottom: 2px;\n}\n.cp-input:focus { border-top-color: var(--red); }\n.cp-input::placeholder { color: var(--muted); font-size: 14px; }\n.cp-textarea { min-height: 140px; resize: vertical; }\n.form-submit {\n  font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;\n  letter-spacing: 3px; text-transform: uppercase;\n  padding: 18px 40px; background: var(--red); color: var(--white); border: none; cursor: pointer;\n  transition: box-shadow 0.3s; margin-top: 4px; align-self: flex-start;\n  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);\n}\n.form-submit:hover { box-shadow: 0 0 40px var(--red-glow); }\n\n/* ═══ FOOTER ═══ */\nfooter {\n  background: var(--bg2); border-top: 1px solid var(--border);\n  padding: 60px;\n}\n.footer-top {\n  max-width: 1200px; margin: 0 auto;\n  display: flex; align-items: flex-start; justify-content: space-between;\n  padding-bottom: 48px; border-bottom: 1px solid var(--border);\n}\n.footer-logo-block .footer-logo {\n  font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900;\n  letter-spacing: 5px; color: var(--red); display: block; margin-bottom: 10px;\n}\n.footer-logo-block p { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--muted); }\n.footer-nav { display: flex; gap: 32px; list-style: none; margin-top: 6px; }\n.footer-nav a { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-decoration: none; text-transform: uppercase; transition: color 0.2s; }\n.footer-nav a:hover { color: var(--white); }\n.footer-bottom {\n  max-width: 1200px; margin: 36px auto 0;\n  display: flex; justify-content: space-between; align-items: center;\n}\n.footer-copy { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); }\n.footer-quote { font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 2px; color: rgba(255,0,0,0.25); max-width: 400px; text-align: right; line-height: 1.6; text-transform: uppercase; }\n\n/* ═══ REVEAL ═══ */\n.reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }\n.reveal.visible { opacity: 1; transform: translateY(0); }\n\n/* ═══ RESPONSIVE ═══ */\n@media (max-width: 960px) {\n  nav { padding: 0 24px; }\n  .nav-links { display: none; }\n  .m-section, .blog-section, .contact-section, .av-section-bg, footer { padding-left: 24px; padding-right: 24px; }\n  .about-wrap, .contact-inner { grid-template-columns: 1fr; gap: 48px; }\n  .skills-readout, .av-grid, .small-projects { grid-template-columns: 1fr; }\n  .project-feature, .project-feature.flip { grid-template-columns: 1fr; direction: ltr; }\n  .proj-visual { min-height: 220px; }\n  .blog-grid { grid-template-columns: 1fr; }\n  .blog-card { grid-template-columns: 1fr; }\n  .blog-card-img { min-height: 120px; }\n  .footer-top { flex-direction: column; gap: 32px; }\n  .footer-bottom { flex-direction: column; gap: 16px; text-align: center; }\n  .footer-quote { text-align: center; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ─── LOADING SCREEN ─── -->\n<div id=\"loader\">\n  <canvas id=\"loader-canvas\"><\u002Fcanvas>\n  <div id=\"loader-content\">\n    <div id=\"loader-sub\">PORTFOLIO // INITIALIZING<\u002Fdiv>\n    <div id=\"loader-bar-wrap\"><div id=\"loader-bar\"><\u002Fdiv><\u002Fdiv>\n    <div id=\"loader-status\">LOADING ASSETS...<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<style>\n#loader {\n  position: fixed; inset: 0; z-index: 10000;\n  background: #000; display: flex; align-items: center; justify-content: center;\n  overflow: hidden;\n  transition: opacity 0.6s ease;\n}\n#loader.fade-out { opacity: 0; pointer-events: none; }\n#loader-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }\n#loader-content {\n  position: relative; z-index: 2;\n  display: flex; flex-direction: column; align-items: center;\n  text-align: center; gap: 20px;\n}\n#loader-sub {\n  font-family: 'Share Tech Mono', monospace;\n  font-size: 12px; letter-spacing: 6px; color: #ff0000; text-transform: uppercase;\n  opacity: 0; animation: ldrFadeIn 0.4s 0.3s forwards;\n  text-shadow: 0 0 20px rgba(255,0,0,0.6);\n}\n#loader-bar-wrap {\n  width: clamp(200px, 40vw, 400px); height: 2px;\n  background: rgba(255,255,255,0.06);\n  opacity: 0; animation: ldrFadeIn 0.4s 0.6s forwards;\n}\n#loader-bar {\n  height: 100%; width: 0%;\n  background: linear-gradient(90deg, #ff0000, #0a54ff);\n  box-shadow: 0 0 16px #ff0000; transition: width 0.1s linear; position: relative;\n}\n#loader-bar::after {\n  content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%);\n  width: 4px; height: 4px; border-radius: 50%; background: #fff; box-shadow: 0 0 8px #fff;\n}\n#loader-status {\n  font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 4px;\n  color: rgba(255,255,255,0.25); text-transform: uppercase;\n  opacity: 0; animation: ldrFadeIn 0.4s 0.8s forwards; min-height: 16px;\n}\n@keyframes ldrFadeIn { to { opacity: 1; } }\n<\u002Fstyle>\n\n<script>\n(function() {\n  const canvas = document.getElementById('loader-canvas');\n  const ctx = canvas.getContext('2d');\n  let W, H, rafId, frame = 0;\n\n  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }\n  resize();\n  window.addEventListener('resize', resize);\n\n  const buf = document.createElement('canvas');\n  const bctx = buf.getContext('2d');\n\n  function buildBase() {\n    buf.width = W; buf.height = H;\n    bctx.fillStyle = '#000';\n    bctx.fillRect(0, 0, W, H);\n    const imgData = bctx.createImageData(W, H);\n    const d = imgData.data;\n    for (let i = 0; i < d.length; i += 4) {\n      const v = Math.random() * 20;\n      d[i]   = v + (Math.random() < 0.003 ? 200 : 0);\n      d[i+1] = v;\n      d[i+2] = v + (Math.random() < 0.003 ? 180 : 0);\n      d[i+3] = 255;\n    }\n    bctx.putImageData(imgData, 0, 0);\n    bctx.fillStyle = 'rgba(0,0,0,0.22)';\n    for (let y = 0; y < H; y += 3) bctx.fillRect(0, y, W, 1);\n    if (Math.random() < 0.05) { bctx.fillStyle = 'rgba(255,0,0,0.05)'; bctx.fillRect(Math.random()*W, 0, Math.random()*4+1, H); }\n    if (Math.random() < 0.05) { bctx.fillStyle = 'rgba(10,84,255,0.05)'; bctx.fillRect(Math.random()*W, 0, Math.random()*4+1, H); }\n  }\n\n  function drawFrame() {\n    buildBase();\n    ctx.clearRect(0, 0, W, H);\n\n    // Full-page glitch slice\n    const heavy = Math.random() < 0.12;\n    const sliceCount = heavy ? Math.floor(Math.random() * 24 + 10) : Math.floor(Math.random() * 5 + 1);\n    let y = 0;\n    while (y < H) {\n      const sh = heavy ? Math.random() * 50 + 4 : Math.random() * 10 + 2;\n      const offset = Math.random() < (heavy ? 0.5 : 0.15) ? (Math.random() - 0.5) * (heavy ? 120 : 40) : 0;\n      ctx.drawImage(buf, 0, y, W, sh, offset, y, W, sh);\n      y += sh;\n    }\n\n    // Chromatic aberration bands\n    if (Math.random() < 0.35) {\n      const ay = Math.random() * H;\n      const ah = Math.random() * H * 0.4 + 8;\n      ctx.globalCompositeOperation = 'screen';\n      ctx.globalAlpha = 0.05 + Math.random() * 0.1;\n      ctx.fillStyle = '#ff0000';\n      ctx.fillRect(0, ay, W, ah);\n      ctx.fillStyle = '#0a54ff';\n      ctx.fillRect(0, ay + ah * 0.3, W, ah * 0.6);\n      ctx.globalCompositeOperation = 'source-over';\n      ctx.globalAlpha = 1;\n    }\n\n    // Hard corruption block\n    if (Math.random() < 0.1) {\n      const sy = Math.floor(Math.random() * H);\n      const sh2 = Math.floor(Math.random() * 50 + 4);\n      const dx = (Math.random() - 0.5) * 150;\n      ctx.drawImage(canvas, 0, sy, W, sh2, dx, sy, W, sh2);\n    }\n\n    // White flash\n    if (Math.random() < 0.006) {\n      ctx.fillStyle = 'rgba(255,255,255,' + (Math.random() * 0.18) + ')';\n      ctx.fillRect(0, 0, W, H);\n    }\n\n    // Red tear lines\n    const tears = Math.floor(Math.random() * 4);\n    for (let t = 0; t < tears; t++) {\n      ctx.fillStyle = 'rgba(255,0,0,' + (Math.random() * 0.3) + ')';\n      ctx.fillRect(0, Math.random() * H, W, 1);\n    }\n\n    // Blue tear lines\n    const btears = Math.floor(Math.random() * 2);\n    for (let t = 0; t < btears; t++) {\n      ctx.fillStyle = 'rgba(10,84,255,' + (Math.random() * 0.2) + ')';\n      ctx.fillRect(0, Math.random() * H, W, 1);\n    }\n\n    frame++;\n    rafId = requestAnimationFrame(drawFrame);\n  }\n  drawFrame();\n\n  const bar = document.getElementById('loader-bar');\n  const status = document.getElementById('loader-status');\n  const messages = ['LOADING ASSETS...','DECRYPTING FILES...','SYNCING DATA...','CALIBRATING UI...','PORTFOLIO READY'];\n  let progress = 0, msgIdx = 0;\n\n  function tick() {\n    progress = Math.min(progress + Math.random() * 4 + 0.5, 100);\n    bar.style.width = progress + '%';\n    const ni = Math.min(Math.floor(progress / 22), messages.length - 1);\n    if (ni !== msgIdx) { msgIdx = ni; status.textContent = messages[msgIdx]; }\n    if (progress < 100) {\n      setTimeout(tick, 35 + Math.random() * 65);\n    } else {\n      status.textContent = 'PORTFOLIO READY';\n      setTimeout(() => {\n        cancelAnimationFrame(rafId);\n        const loader = document.getElementById('loader');\n        loader.classList.add('fade-out');\n        setTimeout(() => loader.remove(), 700);\n      }, 600);\n    }\n  }\n  setTimeout(tick, 800);\n})();\n<\u002Fscript>\n\n<!-- ─── NAV ─── -->\n<nav>\n  <a href=\"#hero\" class=\"nav-logo\">ABDULRAHMAN<\u002Fa>\n  <ul class=\"nav-links\" style=\"width: 383px; height: 26px; line-height: 1.45\">\n    <li><a href=\"#about\">About<\u002Fa><\u002Fli>\n    <li><a href=\"#skills\">Skills<\u002Fa><\u002Fli>\n    <li><a href=\"#projects\">Projects<\u002Fa><\u002Fli>\n    <li><a href=\"#blog\">Reflections<\u002Fa><\u002Fli>\n    <li><a href=\"#contact\">Contact<\u002Fa><\u002Fli>\n  <\u002Ful>\n  <a href=\"#contact\" class=\"nav-btn\">Get In Touch<\u002Fa>\n<\u002Fnav>\n\n<!-- ─── HERO ─── -->\n<section id=\"hero\" data-screen-label=\"01 Hero\">\n  <!-- YouTube background -->\n  <div style=\"position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;\">\n    <div id=\"yt-bg\" style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:177.78vh;height:100vh;min-width:100%;min-height:56.25vw;opacity:0.45;\"><\u002Fdiv>\n  <\u002Fdiv>\n  <!-- Dark overlay so text stays readable -->\n  <div style=\"position:absolute;inset:0;background:linear-gradient(180deg, rgba(7,7,15,0.55) 0%, rgba(7,7,15,0.3) 40%, rgba( a\">\n        <a href=\"mailto:abdulrahman@email.com\" class=\"contact-data-row\">\n          <span class=\"contact-data-key\">EMAIL<\u002Fspan>\n          <span class=\"contact-data-val\">abdulrahman@email.com<\u002Fspan>\n        <\u002Fa>\n        <a href=\"#\" class=\"contact-data-row\">\n          <span class=\"contact-data-key\">LINKEDIN<\u002Fspan>\n          <span class=\"contact-data-val\">linkedin.com/in/abdulrahman<\u002Fspan>\n        <\u002Fa>\n        <a href=\"#\" class=\"contact-data-row\">\n          <span class=\"contact-data-key\">GITHUB<\u002Fspan>\n          <span class=\"contact-data-val\">github.com/abdulrahman<\u002Fspan>\n        <\u002Fa>\n        <a href=\"#\" class=\"contact-data-row\">\n          <span class=\"contact-data-key\">INSTAGRAM<\u002Fspan>\n          <span class=\"contact-data-val\">@abdulrahman<\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <form class=\"contact-form\" onsubmit=\"return false;\">\n      <div>\n        <label class=\"form-row-label\">YOUR NAME<\u002Flabel>\n        <input class=\"cp-input\" type=\"text\" placeholder=\"Enter your name\">\n      <\u002Fdiv>\n      <div>\n        <label class=\"form-row-label\">EMAIL ADDRESS<\u002Flabel>\n        <input class=\"cp-input\" type=\"email\" placeholder=\"Enter your email\">\n      <\u002Fdiv>\n      <div>\n        <label class=\"form-row-label\">MESSAGE<\u002Flabel>\n        <textarea class=\"cp-input cp-textarea\" placeholder=\"Your message...\"><\u002Ftextarea>\n      <\u002Fdiv>\n      <button type=\"submit\" class=\"form-submit\">Transmit Message<\u002Fbutton>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─── FOOTER ─── -->\n<footer>\n  <div class=\"footer-top\">\n    <div class=\"footer-logo-block\">\n      <span class=\"footer-logo\">ABDULRAHMAN<\u002Fspan>\n      <p>MEDIA &amp; COMMUNICATIONS · FUTURE DATA SCIENTIST<\u002Fp>\n    <\u002Fdiv>\n    <ul class=\"footer-nav\">\n      <li><a href=\"#about\">About<\u002Fa><\u002Fli>\n      <li><a href=\"#skills\">Skills<\u002Fa><\u002Fli>\n      <li><a href=\"#projects\">Projects<\u002Fa><\u002Fli>\n      <li><a href=\"#media\">Media<\u002Fa><\u002Fli>\n      <li><a href=\"#blog\">Reflections<\u002Fa><\u002Fli>\n      <li><a href=\"#contact\">Contact<\u002Fa><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n  <div class=\"footer-bottom\">\n    <div class=\"footer-copy\">© 2026 ABDULRAHMAN — ALL RIGHTS RESERVED<\u002Fdiv>\n    <div class=\"footer-quote\">Data is not information. Information is not knowledge. Knowledge is not understanding. Understanding is not wisdom.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n// Scroll reveal\nconst observer = new IntersectionObserver(entries => {\n  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });\n}, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });\ndocument.querySelectorAll('.reveal').forEach(el => observer.observe(el));\n\n// Nav highlight\nconst sections = document.querySelectorAll('section[id]');\nconst links = document.querySelectorAll('.nav-links a');\nwindow.addEventListener('scroll', () => {\n  let cur = '';\n  sections.forEach(s => { if (window.scrollY >= s.offsetTop - 80) cur = s.id; });\n  links.forEach(a => { a.style.color = a.getAttribute('href') === '#' + cur ? 'var(--white)' : ''; });\n}, { passive: true });\n\n// Tweaks\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accentRed\": \"#FF6700\",\n  \"accentBlue\": \"#0a54ff\",\n  \"darkBg\": \"#000000\",\n  \"heroGlitch\": true\n}/*EDITMODE-END*/;\n\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode') showTweaks();\n  if (e.data?.type === '__deactivate_edit_mode') hideTweaks();\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\nlet panel = null;\nfunction showTweaks() {\n  if (panel) { panel.style.display = 'flex'; return; }\n  panel = document.createElement('div');\n  panel.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;background:#0b0b18;border:1px solid rgba(255,0,0,0.3);padding:24px;min-width:260px;font-family:Share Tech Mono,monospace;box-shadow:0 0 40px rgba(255,0,0,0.1);display:flex;flex-direction:column;gap:16px;';\n  panel.innerHTML = `\n    <div style=\"display:flex;justify-content:space-between;align-items:center;\">\n      <span style=\"font-size:10px;letter-spacing:4px;color:#ff0000;\">/// TWEAKS<\u002Fspan>\n      <button id=\"tc\" style=\"background:none;border:none;color:#5a5a78;cursor:pointer;font-size:18px;line-height:1;\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:9px;letter-spacing:3px;color:#5a5a78;margin-bottom:6px;\">RED ACCENT<\u002Fdiv>\n      <input type=\"color\" id=\"tw-r\" value=\"${TWEAK_DEFAULTS.accentRed}\" style=\"width:100%;height:32px;border:1px solid #1a1a2e;background:none;cursor:pointer;\" />\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:9px;letter-spacing:3px;color:#5a5a78;margin-bottom:6px;\">DEEP BLUE<\u002Fdiv>\n      <input type=\"color\" id=\"tw-b\" value=\"${TWEAK_DEFAULTS.accentBlue}\" style=\"width:100%;height:32px;border:1px solid #1a1a2e;background:none;cursor:pointer;\" />\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:9px;letter-spacing:3px;color:#5a5a78;margin-bottom:6px;\">BACKGROUND<\u002Fdiv>\n      <input type=\"color\" id=\"tw-bg\" value=\"${TWEAK_DEFAULTS.darkBg}\" style=\"width:100%;height:32px;border:1px solid #1a1a2e;background:none;cursor:pointer;\" />\n    <\u002Fdiv>\n    <label style=\"display:flex;align-items:center;gap:10px;font-size:9px;letter-spacing:3px;color:#5a5a78;cursor:pointer;\">\n      <input type=\"checkbox\" id=\"tw-g\" ${TWEAK_DEFAULTS.heroGlitch ? 'checked' : ''} /> GLITCH EFFECT\n    <\u002Flabel>`;\n  document.body.appendChild(panel);\n  document.getElementById('tc').onclick = () => { hideTweaks(); window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*'); };\n  const apply = () => {\n    const r = document.getElementById('tw-r').value;\n    const b = document.getElementById('tw-b').value;\n    const bg = document.getElementById('tw-bg').value;\n    const g = document.getElementById('tw-g').checked;\n    document.documentElement.style.setProperty('--red', r);\n    document.documentElement.style.setProperty('--blue', b);\n    document.documentElement.style.setProperty('--bg', bg);\n    const em = document.querySelector('.hero-name em');\n    if (em) em.style.animationPlayState = g ? 'running' : 'paused';\n    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ accentRed:r, accentBlue:b, darkBg:bg, heroGlitch:g } }, '*');\n  };\n  ['tw-r','tw-b','tw-bg','tw-g'].forEach(id => document.getElementById(id).addEventListener('input', apply));\n}\nfunction hideTweaks() { if (panel) panel.style.display = 'none'; }\n<\u002Fscript>\n\n<script>\n// YouTube background\nvar tag = document.createElement('script');\ntag.src = 'https://www.youtube.com/iframe_api';\ndocument.head.appendChild(tag);\nvar ytPlayer;\nfunction onYouTubeIframeAPIReady() {\n  ytPlayer = new YT.Player('yt-bg', {\n    videoId: 'ciU1WY_QKBM',\n    playerVars: {\n      autoplay: 1, mute: 1, loop: 1, playlist: 'ciU1WY_QKBM',\n      controls: 0, showinfo: 0, rel: 0, iv_load_policy: 3,\n      modestbranding: 1, playsinline: 1, disablekb: 1, fs: 0\n    },\n    events: {\n      onReady: function(e) { e.target.playVideo(); e.target.setPlaybackQuality('hd1080'); },\n      onStateChange: function(e) { if (e.data === YT.PlayerState.ENDED) e.target.playVideo(); }\n    }\n  });\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
