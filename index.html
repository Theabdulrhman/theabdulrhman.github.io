<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cat Memes & Videos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #3a6ea5;
      background-image: url('https://upload.wikimedia.org/wikipedia/en/6/6a/Windows_XP_Bliss_1600.png');
      background-size: cover;
      background-position: center;
      font-family: 'Tahoma', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Desktop icon button */
    .desktop-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      user-select: none;
      width: 80px;
    }

    .desktop-icon img {
      width: 48px;
      height: 48px;
      margin-bottom: 6px;
    }

    .desktop-icon span {
      color: white;
      font-size: 12px;
      text-align: center;
      text-shadow: 1px 1px 2px black;
      background: rgba(0,0,100,0.3);
      padding: 1px 4px;
    }

    .desktop-icon:hover span {
      background: #316ac5;
    }

    /* XP Window */
    .xp-window {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 660px;
      max-width: 95vw;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.6);
      border: 2px solid #003087;
      border-radius: 8px 8px 4px 4px;
      z-index: 100;
      resize: both;
      overflow: auto;
    }

    .xp-window.active { display: block; }

    /* Title bar */
    .xp-titlebar {
      background: linear-gradient(to bottom, #0a84e8 0%, #1058c7 4%, #2970d6 8%, #235ebe 50%, #1a52b2 51%, #0e45a8 100%);
      padding: 4px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 6px 6px 0 0;
      cursor: move;
      user-select: none;
    }

    .xp-titlebar-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .xp-titlebar-left img {
      width: 16px;
      height: 16px;
    }

    .xp-titlebar-left span {
      color: white;
      font-size: 12px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .xp-titlebar-buttons {
      display: flex;
      gap: 2px;
    }

    .xp-btn {
      width: 21px;
      height: 21px;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
      color: white;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .xp-btn-minimize {
      background: linear-gradient(to bottom, #6eb4f7, #2e6fd4);
      border: 1px solid #1a4fa0;
    }

    .xp-btn-maximize {
      background: linear-gradient(to bottom, #6eb4f7, #2e6fd4);
      border: 1px solid #1a4fa0;
    }

    .xp-btn-close {
      background: linear-gradient(to bottom, #f07070, #c82020);
      border: 1px solid #8b0000;
    }

    .xp-btn:hover { filter: brightness(1.2); }
    .xp-btn:active { filter: brightness(0.9); }

    /* Window body */
    .xp-body {
      background: #ece9d8;
      border-top: 1px solid #fff;
    }

    /* Menu bar */
    .xp-menubar {
      background: #ece9d8;
      padding: 2px 4px;
      display: flex;
      gap: 2px;
      border-bottom: 1px solid #aca899;
    }

    .xp-menubar span {
      font-size: 12px;
      padding: 2px 6px;
      cursor: pointer;
      color: #000;
    }

    .xp-menubar span:hover {
      background: #316ac5;
      color: white;
    }

    /* Toolbar */
    .xp-toolbar {
      background: linear-gradient(to bottom, #f5f3ee, #dedad0);
      padding: 4px 6px;
      display: flex;
      align-items: center;
      gap: 4px;
      border-bottom: 1px solid #aca899;
      font-size: 12px;
    }

    .xp-toolbar-btn {
      background: linear-gradient(to bottom, #fff, #ddd);
      border: 1px solid #aca899;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 2px;
    }

    .xp-toolbar-btn:hover { background: linear-gradient(to bottom, #def, #acf); }

    .xp-address {
      flex: 1;
      background: white;
      border: 1px inset #999;
      padding: 2px 6px;
      font-size: 12px;
      color: #333;
    }

    /* Content area */
    .xp-content {
      padding: 0;
      background: white;
    }

    .xp-content iframe {
      width: 100%;
      height: 360px;
      border: none;
      display: block;
    }

    /* Status bar */
    .xp-statusbar {
      background: #ece9d8;
      border-top: 1px solid #aca899;
      padding: 2px 8px;
      font-size: 11px;
      color: #444;
      display: flex;
      gap: 12px;
    }

    .xp-statusbar span {
      border-right: 1px solid #aca899;
      padding-right: 12px;
    }

    /* Taskbar */
    .xp-taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 36px;
      background: linear-gradient(to bottom, #245dce 0%, #3f8cf0 4%, #245dce 6%, #1c4fbb 50%, #1a4db9 51%, #1347b2 100%);
      display: flex;
      align-items: center;
      z-index: 200;
      box-shadow: 0 -1px 0 #0a2d8e;
    }

    .xp-start {
      background: linear-gradient(to bottom, #57a818, #3d7a0e);
      border: 1px solid #2a5a08;
      border-radius: 0 12px 12px 0;
      padding: 4px 12px 4px 8px;
      color: white;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 28px;
      margin-left: 2px;
      box-shadow: 1px 1px 4px rgba(0,0,0,0.4);
    }

    .xp-start:hover { filter: brightness(1.1); }

    .xp-start img { width: 18px; height: 18px; }

    .xp-taskbar-items {
      display: flex;
      gap: 4px;
      padding: 0 8px;
      flex: 1;
    }

    .xp-taskbar-item {
      background: linear-gradient(to bottom, #1a4db9, #2e6fd4);
      border: 1px solid #0a2d8e;
      border-radius: 3px;
      padding: 2px 10px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .xp-taskbar-item:hover { filter: brightness(1.2); }

    .xp-clock {
      color: white;
      font-size: 12px;
      padding: 0 12px;
      text-align: right;
    }

    /* Overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: transparent;
      z-index: 50;
    }
    .overlay.active { display: block; }
  </style>
</head>
<body>

  <!-- Desktop Icon -->
  <div class="desktop-icon" ondblclick="openWindow()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Camponotus_flavomarginatus_ant.jpg/48px-Camponotus_flavomarginatus_ant.jpg"
         onerror="this.src='https://win98icons.alexmeub.com/icons/png/media_player_stream_video-0.png'"
         alt="cat video" />
    <span>Cat Video</span>
  </div>
  <p style="color:white;font-size:11px;text-shadow:1px 1px 2px black;margin-top:4px;">Double-click to open</p>

  <!-- XP Window -->
  <div class="xp-window" id="xpWindow">
    <div class="xp-titlebar" id="titlebar">
      <div class="xp-titlebar-left">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/0/0e/Iexplore.png/16px-Iexplore.png"
             onerror="this.style.display='none'" alt="" />
        <span>Cat Video - Windows Internet Explorer</span>
      </div>
      <div class="xp-titlebar-buttons">
        <button class="xp-btn xp-btn-minimize" onclick="closeWindow()">&#8722;</button>
        <button class="xp-btn xp-btn-maximize">&#9744;</button>
        <button class="xp-btn xp-btn-close" onclick="closeWindow()">&#10005;</button>
      </div>
    </div>

    <div class="xp-body">
      <div class="xp-menubar">
        <span>File</span><span>Edit</span><span>View</span><span>Favorites</span><span>Tools</span><span>Help</span>
      </div>
      <div class="xp-toolbar">
        <button class="xp-toolbar-btn">&#9664; Back</button>
        <button class="xp-toolbar-btn">Forward &#9654;</button>
        <button class="xp-toolbar-btn">&#10227; Refresh</button>
        <button class="xp-toolbar-btn">🏠 Home</button>
        <div class="xp-address">https://abdulrhmanalshehri.sa/cat-video</div>
        <button class="xp-toolbar-btn">Go</button>
      </div>
      <div class="xp-content">
        <iframe id="videoFrame"
          src="https://www.youtube.com/embed/KC6cPq-NmuU?autoplay=1"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>
      </div>
      <div class="xp-statusbar">
        <span>Done</span>
        <span>Internet</span>
      </div>
    </div>
  </div>

  <!-- Taskbar -->
  <div class="xp-taskbar">
    <div class="xp-start">
      <img src="https://upload.wikimedia.org/wikipedia/en/thumb/1/1e/Windows_XP_Logo.svg/18px-Windows_XP_Logo.svg.png"
           onerror="this.style.display='none'" alt=""/>
      start
    </div>
    <div class="xp-taskbar-items">
      <div class="xp-taskbar-item" id="taskbarItem" style="display:none" onclick="toggleWindow()">
        🐱 Cat Video
      </div>
    </div>
    <div class="xp-clock" id="clock"></div>
  </div>

  <script>
    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + '\n' +
        now.toLocaleDateString();
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Window controls
    function openWindow() {
      document.getElementById('xpWindow').classList.add('active');
      document.getElementById('taskbarItem').style.display = 'flex';
    }

    function closeWindow() {
      document.getElementById('xpWindow').classList.remove('active');
      document.getElementById('taskbarItem').style.display = 'none';
      // Stop video
      const frame = document.getElementById('videoFrame');
      frame.src = frame.src;
    }

    function toggleWindow() {
      document.getElementById('xpWindow').classList.toggle('active');
    }

    // Draggable window
    const win = document.getElementById('xpWindow');
    const titlebar = document.getElementById('titlebar');
    let isDragging = false, startX, startY, origX, origY;

    titlebar.addEventListener('mousedown', (e) => {
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      const rect = win.getBoundingClientRect();
      origX = rect.left;
      origY = rect.top;
      win.style.transform = 'none';
      win.style.left = origX + 'px';
      win.style.top = origY + 'px';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      win.style.left = (origX + e.clientX - startX) + 'px';
      win.style.top = (origY + e.clientY - startY) + 'px';
    });

    document.addEventListener('mouseup', () => { isDragging = false; });
  </script>

</body>
</html>
